name: Build Sunshine and upload release assets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build sunshine package
        run: nix build .#releaseBuild --print-build-logs

      - name: Package build output
        id: package
        run: |
          set -euo pipefail

          out_path="$(readlink -f result)"
          asset_name="sunshine-main-x86_64-linux"

          tar -czf "${asset_name}.tar.gz" -C "$out_path" .
          sha256sum "${asset_name}.tar.gz" > "${asset_name}.tar.gz.sha256"

          {
            echo "asset_tar=${asset_name}.tar.gz"
            echo "asset_sha256=${asset_name}.tar.gz.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Update rolling release tag
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -fa main-build -m 'Rolling release for main branch'
          git push origin refs/tags/main-build --force

      - name: Upload assets to GitHub release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-build
          name: Main branch build
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            ${{ steps.package.outputs.asset_tar }}
            ${{ steps.package.outputs.asset_sha256 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets as workflow artifacts
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-x86_64-linux
          path: |
            ${{ steps.package.outputs.asset_tar }}
            ${{ steps.package.outputs.asset_sha256 }}
