name: Build Sunshine and upload release assets

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build sunshine package
        run: nix build .#sunshine --print-build-logs

      - name: Package build output
        id: package
        run: |
          set -euo pipefail

          out_path="$(readlink -f result)"
          tag="${{ github.event.release.tag_name || github.ref_name }}"
          asset_name="sunshine-${tag}-x86_64-linux"

          tar -czf "${asset_name}.tar.gz" -C "$out_path" .
          sha256sum "${asset_name}.tar.gz" > "${asset_name}.tar.gz.sha256"

          {
            echo "asset_tar=${asset_name}.tar.gz"
            echo "asset_sha256=${asset_name}.tar.gz.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload assets to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            ${{ steps.package.outputs.asset_tar }}
            ${{ steps.package.outputs.asset_sha256 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets as workflow artifacts
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-x86_64-linux
          path: |
            ${{ steps.package.outputs.asset_tar }}
            ${{ steps.package.outputs.asset_sha256 }}
